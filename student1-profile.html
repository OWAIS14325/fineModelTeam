<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CosmosHub — My Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap"
    rel="stylesheet" />
  <style>
    body {
      font-family: 'Syne', sans-serif;
      background: #05050f;
      font-size: 16px;
      line-height: 1.7;
    }

    .mono {
      font-family: 'Space Mono', monospace;
    }

    .star-bg {
      background-image:
        radial-gradient(1px 1px at 15% 25%, rgba(255, 255, 255, 0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 70%, rgba(255, 255, 255, 0.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 20%, rgba(255, 255, 255, 0.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 35% 85%, rgba(255, 255, 255, 0.2) 0%, transparent 100%);
    }

    input:focus,
    textarea:focus {
      outline: none;
    }
  </style>
</head>

<body class="min-h-screen star-bg text-white">
  <nav class="border-b border-white/10 bg-black/40 backdrop-blur-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-14">
      <a href="student1-profile.html" class="mono text-purple-400 font-bold tracking-widest text-sm shrink-0">🚀
        COSMOSHUB</a>
      <div class="flex items-center gap-1 overflow-x-auto ml-4">
        <a href="student1-profile.html"
          class="mono text-xs px-3 py-1.5 rounded-lg border whitespace-nowrap transition-all font-bold"
          style="background:rgba(167,139,250,0.15); color:#a78bfa; border-color:rgba(167,139,250,0.4);">👤 Profile</a>
        <a href="student2-apod.html"
          class="mono text-xs px-3 py-1.5 rounded-lg border border-transparent text-gray-400 hover:text-white whitespace-nowrap transition-all">🌌
          APOD</a>
        <a href="student3-mars.html"
          class="mono text-xs px-3 py-1.5 rounded-lg border border-transparent text-gray-400 hover:text-white whitespace-nowrap transition-all">🔴
          Mars</a>
        <a href="student4-asteroids.html"
          class="mono text-xs px-3 py-1.5 rounded-lg border border-transparent text-gray-400 hover:text-white whitespace-nowrap transition-all">☄️
          Asteroids</a>
        <a href="student5-iss.html"
          class="mono text-xs px-3 py-1.5 rounded-lg border border-transparent text-gray-400 hover:text-white whitespace-nowrap transition-all">🛸
          ISS</a>
        <a href="student6-favourites.html"
          class="mono text-xs px-3 py-1.5 rounded-lg border border-transparent text-gray-400 hover:text-white whitespace-nowrap transition-all">⭐
          Favourites</a>
        <a href="student7-log.html"
          class="mono text-xs px-3 py-1.5 rounded-lg border border-transparent text-gray-400 hover:text-white whitespace-nowrap transition-all">📅
          Log</a>
        <a href="student8-weather.html"
          class="mono text-xs px-3 py-1.5 rounded-lg border border-transparent text-gray-400 hover:text-white whitespace-nowrap transition-all">🌡️
          Weather</a>
        <a href="student9-stats.html"
          class="mono text-xs px-3 py-1.5 rounded-lg border border-transparent text-gray-400 hover:text-white whitespace-nowrap transition-all">📊
          Stats</a>
        <a href="student10-search.html"
          class="mono text-xs px-3 py-1.5 rounded-lg border border-transparent text-gray-400 hover:text-white whitespace-nowrap transition-all">🔍
          Search</a>
      </div>
    </div>
  </nav>
  <main class="max-w-xl mx-auto px-4 py-12">
    <div class="mb-8">
      <p class="mono text-purple-400 text-xs tracking-widest mb-2">STUDENT 1 · MY PROFILE</p>
      <h1 class="text-3xl font-extrabold tracking-tight">Altaf</h1>
    </div>

    <div class="bg-white/5 border border-white/10 rounded-2xl overflow-hidden">

      <div
        class="bg-gradient-to-br from-purple-900/40 to-indigo-900/40 px-8 py-10 flex flex-col items-center border-b border-white/10">
        <div id="avatarCircle"
          class="w-24 h-24 rounded-full bg-purple-600 flex items-center justify-center text-4xl font-extrabold text-white mb-5 select-none">
          A</div>
        <h2 id="profileName" class="text-2xl font-bold text-white mb-3">Altaf</h2>
        <span id="rankBadge"
          class="mono text-sm bg-purple-900/60 text-purple-300 border border-purple-700/50 px-4 py-1.5 rounded-full">🌱
          Full Stack Developer</span>
      </div>

      <div class="divide-y divide-white/5">
        <div class="flex justify-between items-center px-8 py-5">
          <span class="mono text-sm text-gray-400 tracking-wide">JOINED</span>
          <span id="joinedDate" class="text-base text-white">—</span>
        </div>
        <div class="flex justify-between items-center px-8 py-5">
          <span class="mono text-sm text-gray-400 tracking-wide">TOTAL SAVES</span>
          <span id="totalSaves" class="mono text-base font-bold text-yellow-400">0</span>
        </div>
        <div class="flex justify-between items-center px-8 py-5">
          <span class="mono text-sm text-gray-400 tracking-wide">DISCOVERY NOTES</span>
          <span id="totalNotes" class="mono text-base font-bold text-cyan-400">0</span>
        </div>
        <div class="flex justify-between items-center px-8 py-5">
          <span class="mono text-sm text-gray-400 tracking-wide">FAVOURITE PLANET</span>
          <span id="totalNotes" class="mono text-base font-bold text-indigo-400">0</span>
        </div>
      </div>

      <div class="px-8 py-6 border-t border-white/10 space-y-3">
        <button id="editBtn"
          class="w-full bg-teal-700 hover:bg-purple-600 active:scale-95 transition-all text-white mono text-sm tracking-widest py-3 rounded-xl font-bold">
          ✏️ EDIT PROFILE
        </button>
        <div id="editForm" class="hidden space-y-3">
          <input id="nameInput" type="text" placeholder="Enter your astronaut name..."
            class="w-full bg-white/5 border border-white/10 focus:border-purple-500 text-white rounded-xl px-4 py-3 text-base transition-colors" />
          <button id="saveBtn"
            class="w-full bg-green-700 hover:bg-green-600 active:scale-95 transition-all text-white mono text-sm tracking-widest py-3 rounded-xl font-bold">
            💾 SAVE NAME
          </button>
        </div>
      </div>
    </div>
  </main>
  <script>
    // localStorage key: "userProfile"  → { astronautName, joinedDate }
    // localStorage key: "favourites"   → array of saved items
    // localStorage key: "discoveryLog" → array of notes
  </script>
</body>

</html>
