<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CosmosHub — Asteroid Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Syne', sans-serif; background: #05050f; font-size: 16px; line-height: 1.7; }
    .mono { font-family: 'Space Mono', monospace; }
    .star-bg {
      background-image:
        radial-gradient(1px 1px at 15% 25%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 70%, rgba(255,255,255,0.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 20%, rgba(255,255,255,0.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 35% 85%, rgba(255,255,255,0.2) 0%, transparent 100%);
    }
    input:focus, textarea:focus { outline: none; }
    .spin{animation:spin 1s linear infinite;} @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body class="min-h-screen star-bg text-white">
  <nav class="border-b border-white/10 bg-black/40 backdrop-blur-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-14">
      <a href="student1-profile.html" class="mono text-purple-400 font-bold tracking-widest text-sm shrink-0">🚀 COSMOSHUB</a>
      <div class="flex items-center gap-1 overflow-x-auto ml-4">
        <a href="student1-profile.html" class="mono text-xs px-3 py-1.5 rounded-lg border border-transparent text-gray-400 hover:text-white whitespace-nowrap transition-all" >👤 Profile</a>
        <a href="student2-apod.html" class="mono text-xs px-3 py-1.5 rounded-lg border border-transparent text-gray-400 hover:text-white whitespace-nowrap transition-all" >🌌 APOD</a>
        <a href="student3-mars.html" class="mono text-xs px-3 py-1.5 rounded-lg border border-transparent text-gray-400 hover:text-white whitespace-nowrap transition-all" >🔴 Mars</a>
        <a href="student4-asteroids.html" class="mono text-xs px-3 py-1.5 rounded-lg border whitespace-nowrap transition-all font-bold" style="background:rgba(251,191,36,0.15); color:#fbbf24; border-color:rgba(251,191,36,0.4);">☄️ Asteroids</a>
        <a href="student5-iss.html" class="mono text-xs px-3 py-1.5 rounded-lg border border-transparent text-gray-400 hover:text-white whitespace-nowrap transition-all" >🛸 ISS</a>
        <a href="student6-favourites.html" class="mono text-xs px-3 py-1.5 rounded-lg border border-transparent text-gray-400 hover:text-white whitespace-nowrap transition-all" >⭐ Favourites</a>
        <a href="student7-log.html" class="mono text-xs px-3 py-1.5 rounded-lg border border-transparent text-gray-400 hover:text-white whitespace-nowrap transition-all" >📅 Log</a>
        <a href="student8-weather.html" class="mono text-xs px-3 py-1.5 rounded-lg border border-transparent text-gray-400 hover:text-white whitespace-nowrap transition-all" >🌡️ Weather</a>
        <a href="student9-stats.html" class="mono text-xs px-3 py-1.5 rounded-lg border border-transparent text-gray-400 hover:text-white whitespace-nowrap transition-all" >📊 Stats</a>
        <a href="student10-search.html" class="mono text-xs px-3 py-1.5 rounded-lg border border-transparent text-gray-400 hover:text-white whitespace-nowrap transition-all" >🔍 Search</a>
      </div>
    </div>
  </nav>
  <main class="max-w-2xl mx-auto px-4 py-12">
    <div class="mb-8">
      <p class="mono text-yellow-400 text-xs tracking-widest mb-2">STUDENT 4 · NASA NEO API</p>
      <h1 class="text-3xl font-extrabold tracking-tight">Asteroid Tracker</h1>
      <p class="text-gray-400 text-base mt-2">Near-Earth Objects passing this week</p>
    </div>

    <div id="closestBox" class="bg-yellow-900/20 border border-yellow-600/40 rounded-2xl p-5 mb-6">
      <p class="mono text-yellow-400 text-xs tracking-widest mb-2">⚡ CLOSEST APPROACH THIS WEEK</p>
      <h2 id="closestName" class="text-xl font-bold text-white">2k26 Zypher Approaching Earth Today. </h2>
      <p id="closestDetail" class="text-yellow-200/70 text-base mt-1">—</p>
    </div>

    <div id="loadingSpinner" class="hidden flex-col items-center justify-center py-20 gap-4">
      <div class="w-10 h-10 rounded-full border-4 border-yellow-500 border-t-transparent spin"></div>
      <p class="mono text-sm text-yellow-400 tracking-widest">SCANNING FOR ASTEROIDS...</p>
    </div>

    <div id="asteroidList" class="space-y-3"></div>
  </main>
  <script>
    const NASA_KEY = "DEMO_KEY"
    const today    = new Date().toISOString().split("T")[0]
    const nextWeek = new Date(Date.now() + 7*24*60*60*1000).toISOString().split("T")[0]
    // API: https://api.nasa.gov/neo/rest/v1/feed?start_date=${today}&end_date=${nextWeek}&api_key=${NASA_KEY}
    // Flatten: const all = Object.values(data.near_earth_objects).flat()
     const asteroids = [
    {
      name: "2k26 Zypher",
      date: "May 12, 2026",
      distance: "550,000 km",
      distanceNumber: 550000,
      diameter: "0.8 km",
      isDangerous: false
    },
    {
      name: "2k26 Zenion",
      date: "May 20, 2026",
      distance: "2,550,000 km",
      distanceNumber: 2550000,
      diameter: "0.9 km",
      isDangerous: true
    },
    {
      name: "2k25 Qnion",
      date: "May 11, 2026",
      distance: "5,900,000 km",
      distanceNumber: 5900000,
      diameter: "0.05 km",
      isDangerous: false
    }
  ];
   let closestAsteroid = asteroids.find(function(asteroid) {

  return asteroid.distanceNumber === 550000

})
document.getElementById("closestName").innerText =
  closestAsteroid.name + " is the closest asteroid this week"

document.getElementById("closestDetail").innerText =
  "Distance: " + closestAsteroid.distance
  
  const asteroidList = document.getElementById("asteroidList")

  let asteroidCards = asteroids.map(function(asteroid) {

    let badge = ""

    if (asteroid.isDangerous === true) {
      badge = `
        <span class="shrink-0 mono text-sm bg-red-900/50 text-red-300 border border-red-700/50 px-3 py-1.5 rounded-full">
          ⚠️ DANGEROUS
        </span>
      `
    } else {
      badge = `
        <span class="shrink-0 mono text-sm bg-green-900/50 text-green-300 border border-green-700/50 px-3 py-1.5 rounded-full">
          ✅ SAFE
        </span>
      `
    }
let cardBorder = ""

if (asteroid.isDangerous === true) {
  cardBorder = "border-red-700/50"
} else {
  cardBorder = "border-white/10"
}
    return `
      <div class="bg-white/5 border ${cardBorder} rounded-2xl p-5 flex justify-between items-center gap-4">
        <div class="space-y-1">
          <h3 class="font-bold text-white text-base">☄️ (${asteroid.name})</h3>
          <p class="mono text-gray-400 text-sm">Approach: ${asteroid.date}</p>
          <p class="mono text-gray-400 text-sm">Distance: ${asteroid.distance}</p>
          <p class="mono text-gray-400 text-sm">Diameter: ~${asteroid.diameter}</p>
          <button 
  onclick="saveAsteroid('${asteroid.name}')"
  class="mt-2 mono text-xs bg-yellow-500/20 border border-yellow-500/40 text-yellow-300 px-3 py-1 rounded-lg"
>
  ⭐ Save
</button>
        </div>

        ${badge}
      </div>
    `
  })

  asteroidList.innerHTML = asteroidCards.join("")

  const dangerousAsteroids = asteroids.filter(function(asteroid) {
    return asteroid.isDangerous === true
  })

  const safeAsteroids = asteroids.filter(function(asteroid) {
    return asteroid.isDangerous === false
  })

  document.getElementById("totalCount").innerText = asteroids.length
  document.getElementById("dangerCount").innerText = dangerousAsteroids.length
  document.getElementById("safeCount").innerText = safeAsteroids.length
  function saveAsteroid(name) {

  let favourites = JSON.parse(localStorage.getItem("favourites")) || []

  favourites.push({
    type: "asteroid",
    name: name
  })

  localStorage.setItem("favourites", JSON.stringify(favourites))

  alert(name + " saved to favourites!")
}
  </script>
</body>
</html>
