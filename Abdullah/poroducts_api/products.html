<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products</title>
    <script src="https://cdn.tailwindcss.com"></script>


    <script>
        let products;
        fetch("https://fakestoreapi.com/products?limit=8")
            .then(res => {
                if (!res.ok) {
                    throw new Error("Request failed: " + res.status);
                }
                return res.json();
            })
            .then(data => {
                console.log(data);
                products = data;
                showproducts();
            })
            .catch(err => {
                console.log("Something went wrong:", err.message);
            });

        function showproducts() {

            let htmlDom = "";
            for (prod of products) {
                console.log(prod);

                htmlDom += `
                <div class="bg-teal-100 rounded-xl shadow-sm border border-gray-40 overflow-hidden ">
      <img src="${prod.image}" class="w-1/3 h-55 object-cover grid grid-cols-5 gap-4 p-6" />
      <div class="p-4">
        <p class="text-xs text-black-400 mb-1">${prod.category
                    }</p>
        <p class="text-sm font-semibold text-pink-800 truncate">${prod.title }</p>
        <div class="flex products-center justify-between mt-2">
          <span class="text-sm font-bold text-brown-600">${prod.price + " ₹ / 10%off 🔥"}</span>
          <span class="text-xs text-green-1500">★ ${prod.rating.rate}</span>
        </div>
      </div>
    </div>`;


            }


            document.getElementById('grid').innerHTML = htmlDom

        }
    </script>
</head>

<body>

    <h1 class="text-4xl font-bold text-gray-800 mb-6 text-center">🔥 Great Summer sale (start 8th May) 🔥</h1>

    <div id="grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">

    </div>

</body>

</html>
