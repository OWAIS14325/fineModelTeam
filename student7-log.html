  <main class="max-w-xl mx-auto px-4 py-12">

    <div class="bg-white/5 border border-cyan-700/30 rounded-2xl p-6 mb-8">
      <p class="mono text-cyan-400 text-sm tracking-widest mb-4">✏️ LOG A NEW DISCOVERY</p>
      <textarea id="noteInput" rows="3" placeholder="Describe your cosmic discovery..."

      <button id="saveNoteBtn"
        class="mt-3 w-full bg-teal-800/60 hover:bg-teal-700/70 border border-teal-600/40 text-white-300 mono text-sm tracking-widest py-3 rounded-xl transition-all active:scale-95 font-bold"
        onclick="saveNote()"
        >
        📝 SAVE TO LOG
      </button>
    </div>

    <div id="emptyState" class="hidden text-center py-16">
      <p class="text-5xl mb-3">📓</p>
      <p class="text-gray-500 text-base">No discoveries logged yet. Write your first note above!</p>
    </div>

    <div id="logList" class="relative space-y-4 pl-6">

    </div>

    // localStorage key: "discoveryLog"

    const entries = [

    const html = entries.map((en) => {

          <div class="flex justify-between items-start mb-3">
            <span class="mono text-cyan-400 text-sm">🗓${en.date}</span>
            <button class="mono text-sm text-red-400 hover:text-red-300 transition-colors">✕ Delete</button>
          </div>
          <p class="text-base text-gray-300 leading-relaxed">${en.text}</p>
        </div>
      </div> `
      
      })

      
    document.getElementById('logList').innerHTML = html.join('')

    function saveNote(){
      let textarea = document.getElementById('noteInput').value
      if(textarea==""){
