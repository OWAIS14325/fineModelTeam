<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products</title>
  <script src="https://cdn.tailwindcss.com"></script>

    <script>
      let product;
      fetch("https://fakestoreapi.com/products?limit=5")
            .then(res => {
                if (!res.ok) {
                    throw new Error("Request failed: " + res.status);
                }
      return res.json();
            })
            .then(data => {
        console.log(data);
        products = data
                showProducts()

            })
            .catch(err => {
        console.log("Something went wrong:", err.message);
            });

      function showProducts() {


      let htmlDom = ""
      for(let product of products){

        htmlDom += `
              
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
      <img src="${product.image}" class="w-full h-36 object-cover" />
      <div class="p-3">
        <p class="text-xs text-gray-400 mb-1">"${product.category}"</p>
        <p class="text-sm font-semibold text-gray-800 truncate">"${product.title}"</p>
        <div class="flex items-center justify-between mt-2">
          <span class="text-sm font-bold text-indigo-600">"${product.price}"</span>
          <span class="text-xs text-yellow-500">"${product.rating.rate}"</span>
        </div>
      </div>
    </div>

                `

      }


      document.getElementById('grid').innerHTML = htmlDom
          
        }
  </script>
</head>

<body class="min-h-screen bg-gray-50 p-6">

  <h1 class="text-xl font-bold text-gray-800 mb-6">Products</h1>

  <div id="grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">

    

  </div>

</body>

</html>
